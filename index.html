<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To Anh Loan — A Life Well Traveled</title>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />

  <!-- D3 + TopoJSON -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

  <!-- Travel data (edit this file to add countries & photos) -->
  <script src="data.js"></script>
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────── -->
  <header>
    <h1 class="header-title">To Anh Loan</h1>
    <p class="header-subtitle">A Life Well Traveled</p>
  </header>

  <!-- ── World Map ─────────────────────────────────────── -->
  <main id="map-container">
    <svg id="world-map"></svg>
  </main>

  <!-- ── Tooltip ───────────────────────────────────────── -->
  <div id="tooltip"></div>

  <!-- ── Location Picker Modal ─────────────────────────── -->
  <div id="location-modal" class="modal-backdrop" role="dialog" aria-modal="true">
    <div class="modal">
      <button id="close-location-modal" class="modal-close" aria-label="Close">&times;</button>
      <h2 class="location-modal-title" id="location-country-name"></h2>
      <p class="location-modal-subtitle">Choose a destination</p>
      <ul class="location-list" id="location-list"></ul>
    </div>
  </div>

  <!-- ── Gallery Modal ─────────────────────────────────── -->
  <div id="gallery-modal" class="modal-backdrop" role="dialog" aria-modal="true">
    <div class="modal">
      <button id="close-gallery-modal" class="modal-close" aria-label="Close">&times;</button>
      <div class="gallery-header">
        <p class="gallery-country" id="gallery-country-label"></p>
        <h2 class="gallery-location-title" id="gallery-location-title"></h2>
      </div>
      <div class="masonry-grid" id="photo-grid"></div>
    </div>
  </div>

  <!-- ── Lightbox ──────────────────────────────────────── -->
  <div id="lightbox" role="dialog" aria-modal="true">
    <button id="lb-close" aria-label="Close lightbox">&times;</button>
    <button id="lb-prev" class="lb-btn" aria-label="Previous photo">&#8592;</button>
    <img id="lightbox-img" src="" alt="Full size photo" />
    <button id="lb-next" class="lb-btn" aria-label="Next photo">&#8594;</button>
    <div id="lb-counter"></div>
  </div>

  <!-- ── Footer ────────────────────────────────────────── -->
  <footer>
    Made with love &nbsp;&#10022;&nbsp; Happy Birthday
  </footer>

  <!-- App logic -->
  <script src="app.js"></script>
</body>
</html>
