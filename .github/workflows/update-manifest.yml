name: Update Photo Manifest

on:
  push:
    paths:
      - 'photos/**'
      - 'data.js'

jobs:
  manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate photos/manifest.json
        run: |
          python3 - <<'EOF'
          import os, json

          IMAGE_EXTS = {'.jpg', '.jpeg', '.png', '.gif', '.webp', '.avif', '.heic'}
          manifest = {}

          for root, dirs, files in os.walk('photos'):
              # skip hidden dirs
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              images = sorted(
                  f for f in files
                  if os.path.splitext(f)[1].lower() in IMAGE_EXTS
              )
              if images:
                  key = os.path.relpath(root, 'photos')
                  manifest[key] = images

          with open('photos/manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)

          print("manifest.json generated:")
          print(json.dumps(manifest, indent=2))
          EOF

      - name: Commit manifest if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add photos/manifest.json
          git diff --cached --quiet || git commit -m "chore: update photo manifest"
          git push
